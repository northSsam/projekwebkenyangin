<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../output.css" rel="stylesheet" />
    <script src="https://unpkg.com/feather-icons"></script>
</head>

<body class="font-Inter">
    <div class="w-screen h-screen flex">
        <div class="w-[54vw] h-screen">
            <img class="object-right md:object-cover w-screen h-screen" src="../aset_aset_asink/bg.jpg" alt="Makanana Enak" />
        </div>
        <div class="w-[46vw] h-screen bg-white flex flex-col items-center">
            <a href="login.html" class="ml-4 mt-4 mr-auto">
                <i class="cursor-pointer w-8 h-8" data-feather="chevron-left"></i>
            </a>
            <form class="h-fit w-[65%] mt-16 flex flex-col" id="form">
                <h1 class="text-3xl font-semibold">Reset Password</h1>
                <p class="text-gray-400 text-sm">Buat password baru, pastikan password berbeda dari yang sebelumnya</p>
                <div class="flex flex-col gap-0">
                    <label for="new_password" class="font-bold text-md mt-4">Password Baru</label>
                    <input autocomplete="off" autofocus
                        class="h-9 w-full flex items-center shadow-lg border border-gray-300 rounded-md pl-4 focus:border-none focus:ring-3 focus:ring-cherry outline-none"
                        type="password" name="new_password" placeholder="********" required />
                    <label class="font-bold text-md mt-4" for="password">Konfirmasi Password</label>
                    <input autocomplete="off"
                        class="h-9 w-full flex items-center shadow-lg border border-gray-300 rounded-md pl-4 focus:border-none focus:ring-3 focus:ring-cherry outline-none"
                        type="password" name="password" placeholder="********" required />
                    <button class="w-full h-9 mt-4 cursor-pointer font-bold text-white text-center bg-cherry rounded-md shadow-md"
                        type="submit">
                        Ubah Password
                    </button>
                </div>
            </form>
        </div>
    </div>


    <script>
        feather.replace();
    </script>
</body>

</html>
